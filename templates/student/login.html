<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevProfile — Log In</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --bg: #0a0a0f; --surface: #13131a; --border: #1e1e2e;
            --accent: #7c6fff; --accent2: #ff6f91;
            --text: #e8e8f0; --muted: #6b6b80; --card: #16161f;
        }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; min-height: 100vh; overflow-x: hidden; }
        nav {
            position: fixed; top: 0; left: 0; right: 0; z-index: 100;
            display: flex; align-items: center; justify-content: space-between;
            padding: 1.2rem 4rem;
            background: rgba(10,10,15,0.85); backdrop-filter: blur(16px);
            border-bottom: 1px solid var(--border);
        }
        .nav-logo { font-family: 'Space Grotesk', sans-serif; font-size: 1.4rem; font-weight: 700; color: var(--text); text-decoration: none; letter-spacing: -0.03em; }
        .nav-logo span { color: var(--accent); }
        .nav-links { display: flex; gap: 2rem; list-style: none; }
        .nav-links a { color: var(--muted); text-decoration: none; font-size: 0.9rem; font-weight: 500; transition: color 0.2s; }
        .nav-links a:hover, .nav-links a.active { color: var(--text); }
        .container { max-width: 420px; margin: 0 auto; padding: 0 2rem; }
        .auth-card {
            margin-top: 11rem;
            background: var(--card); border: 1px solid var(--border);
            border-radius: 16px; padding: 2.5rem;
        }
        .auth-card h2 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1.7rem; font-weight: 700; letter-spacing: -0.03em;
            margin-bottom: 1.8rem; text-align: center;
        }
        form p { margin-bottom: 1.2rem; }
        form label { display: block; font-size: 0.85rem; font-weight: 500; color: var(--muted); margin-bottom: 0.4rem; }
        form input {
            width: 100%; padding: 0.7rem 0.9rem;
            background: var(--surface); border: 1px solid var(--border);
            border-radius: 8px; color: var(--text); font-size: 0.92rem;
            font-family: 'Inter', sans-serif; transition: border-color 0.2s;
        }
        form input:focus { outline: none; border-color: var(--accent); }
        form ul.errorlist { list-style: none; color: var(--accent2); font-size: 0.8rem; margin-top: 0.3rem; }
        .btn-primary {
            width: 100%; background: var(--accent); color: #fff;
            padding: 0.85rem 2rem; border: none; border-radius: 10px;
            font-weight: 600; font-size: 0.95rem; cursor: pointer;
            transition: transform 0.2s, opacity 0.2s;
        }
        .btn-primary:hover { transform: translateY(-2px); opacity: 0.9; }
        .auth-switch { margin-top: 1.3rem; text-align: center; color: var(--muted); font-size: 0.88rem; }
        .auth-switch a { color: var(--accent); text-decoration: none; font-weight: 600; }
        .auth-switch a:hover { text-decoration: underline; }
        .orb { position: fixed; border-radius: 50%; pointer-events: none; z-index: 0; filter: blur(80px); opacity: 0.2; }
        .orb1 { width: 350px; height: 350px; background: var(--accent2); top: 50px; right: -80px; }
        .orb2 { width: 280px; height: 280px; background: var(--accent); bottom: 150px; left: -60px; }
    </style>
</head>
<body>

<div class="orb orb1"></div>
<div class="orb orb2"></div>

<nav>
    <a href="{% url 'home' %}" class="nav-logo">Dev<span>Profile</span></a>
    <ul class="nav-links">
        <li><a href="{% url 'home' %}">Home</a></li>
        <li><a href="{% url 'about' %}">About</a></li>
        <li><a href="{% url 'registration' %}">Register</a></li>
        {% if user.is_authenticated %}
            <li><a href="{% url 'logout' %}">Logout</a></li>
        {% else %}
            <li><a href="{% url 'login' %}">Login</a></li>
            <li><a href="{% url 'signup' %}">Sign Up</a></li>
        {% endif %}
    </ul>
</nav>


<div class="container">
    <div class="auth-card">
        <h2>Log In</h2>
        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn-primary">Log In</button>
        </form>
        <p class="auth-switch">No account? <a href="{% url 'signup' %}">Sign up</a></p>
    </div>
</div>

</body>
</html>
