<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevProfile — Sign Up</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --bg: #0a0a0f; --surface: #13131a; --border: #1e1e2e;
            --accent: #7c6fff; --accent2: #ff6f91;
            --text: #e8e8f0; --muted: #6b6b80; --card: #16161f;
        }
        body {
            background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif;
            min-height: 100vh; overflow-x: hidden;
            display: flex; flex-direction: column;
        }

        nav {
            position: fixed; top: 0; left: 0; right: 0; z-index: 100;
            display: flex; align-items: center; justify-content: space-between;
            padding: 1.2rem 4rem;
            background: rgba(10,10,15,0.85); backdrop-filter: blur(16px);
            border-bottom: 1px solid var(--border);
        }
        .nav-logo { font-family: 'Space Grotesk', sans-serif; font-size: 1.4rem; font-weight: 700; color: var(--text); text-decoration: none; letter-spacing: -0.03em; }
        .nav-logo span { color: var(--accent); }
        .nav-links { display: flex; gap: 2rem; list-style: none; }
        .nav-links a { color: var(--muted); text-decoration: none; font-size: 0.9rem; font-weight: 500; transition: color 0.2s; }
        .nav-links a:hover, .nav-links a.active { color: var(--text); }

        .auth-wrap {
            flex: 1; display: flex; align-items: center; justify-content: center;
            padding: 9rem 1.5rem 3rem; position: relative;
        }
        .auth-wrap::before {
            content: ''; position: absolute; inset: 0;
            background: radial-gradient(ellipse 50% 40% at 50% 30%, rgba(124,111,255,0.12) 0%, transparent 70%);
            pointer-events: none;
        }

        .auth-card {
            position: relative; z-index: 1;
            width: 100%; max-width: 400px;
            background: var(--card); border: 1px solid var(--border);
            border-radius: 18px; padding: 2.75rem 2.5rem;
            box-shadow: 0 20px 60px rgba(0,0,0,0.35);
        }

        .auth-icon {
            width: 52px; height: 52px; border-radius: 14px;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            display: flex; align-items: center; justify-content: center;
            font-size: 1.4rem; margin: 0 auto 1.3rem;
        }

        .auth-card h2 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1.6rem; font-weight: 700; letter-spacing: -0.03em;
            text-align: center; margin-bottom: 0.4rem;
        }
        .auth-subtitle {
            text-align: center; color: var(--muted); font-size: 0.86rem;
            margin-bottom: 2rem;
        }

        form p { margin-bottom: 1.3rem; }
        form label {
            display: block; font-size: 0.8rem; font-weight: 600;
            color: var(--muted); text-transform: uppercase; letter-spacing: 0.04em;
            margin-bottom: 0.45rem;
        }
        form input {
            width: 100%; padding: 0.75rem 0.95rem;
            background: var(--surface); border: 1px solid var(--border);
            border-radius: 9px; color: var(--text); font-size: 0.92rem;
            font-family: 'Inter', sans-serif;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        form input:focus {
            outline: none; border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(124,111,255,0.15);
        }
        form .helptext {
            display: block; color: var(--muted); font-size: 0.74rem;
            margin-top: 0.4rem; line-height: 1.5;
        }
        form ul.errorlist {
            list-style: none; color: var(--accent2); font-size: 0.78rem;
            margin-top: 0.4rem; padding: 0.5rem 0.7rem;
            background: rgba(255,111,145,0.08); border: 1px solid rgba(255,111,145,0.2);
            border-radius: 6px;
        }

        .btn-primary {
            width: 100%; background: var(--accent); color: #fff;
            padding: 0.85rem 2rem; border: none; border-radius: 10px;
            font-weight: 600; font-size: 0.95rem; cursor: pointer;
            margin-top: 0.5rem;
            transition: transform 0.2s, opacity 0.2s;
        }
        .btn-primary:hover { transform: translateY(-2px); opacity: 0.9; }

        .auth-divider {
            display: flex; align-items: center; gap: 0.8rem;
            margin: 1.8rem 0 1.5rem; color: var(--muted); font-size: 0.78rem;
        }
        .auth-divider::before, .auth-divider::after {
            content: ''; flex: 1; height: 1px; background: var(--border);
        }

        .auth-switch { text-align: center; color: var(--muted); font-size: 0.88rem; }
        .auth-switch a { color: var(--accent); text-decoration: none; font-weight: 600; }
        .auth-switch a:hover { text-decoration: underline; }

        .orb { position: fixed; border-radius: 50%; pointer-events: none; z-index: 0; filter: blur(80px); opacity: 0.2; }
        .orb1 { width: 350px; height: 350px; background: var(--accent2); top: 50px; right: -80px; }
        .orb2 { width: 280px; height: 280px; background: var(--accent); bottom: 150px; left: -60px; }
    </style>
</head>
<body>

<div class="orb orb1"></div>
<div class="orb orb2"></div>

<nav>
    <a href="{% url 'home' %}" class="nav-logo">Dev<span>Profile</span></a>
    <ul class="nav-links">
        <li><a href="{% url 'home' %}">Home</a></li>
        <li><a href="{% url 'about' %}">About</a></li>
        <li><a href="{% url 'registration' %}">Register</a></li>
        {% if user.is_authenticated %}
            <li><a href="{% url 'logout' %}">Logout</a></li>
        {% else %}
            <li><a href="{% url 'login' %}">Login</a></li>
            <li><a href="{% url 'signup' %}">Sign Up</a></li>
        {% endif %}
    </ul>
</nav>


<div class="auth-wrap">
    <div class="auth-card">
        <div class="auth-icon">✦</div>
        <h2>Create your account</h2>
        <p class="auth-subtitle">Join DevProfile and build your developer profile</p>

        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn-primary">Sign Up</button>
        </form>

        <div class="auth-divider">already a member</div>
        <p class="auth-switch"><a href="{% url 'login' %}">Log in to your account →</a></p>
    </div>
</div>

</body>
</html>
